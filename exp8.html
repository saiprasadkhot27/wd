<!DOCTYPE html>
<html>
<head>
    <title>HTML List Demo</title>
</head>

<body>

    <h2>HTML List Demonstration</h2>

    <!-- Ordered List -->
    <h3>1. Ordered List</h3>
    <ol type="1">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <!-- Unordered List -->
    <h3>2. Unordered List</h3>
    <ul type="circle">
        <li>Pizza</li>
        <li>Burger</li>
        <li>Pasta</li>
    </ul>

    <!-- Description List -->
    <h3>3. Description List</h3>
    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>

        <dt>JS</dt>
        <dd>JavaScript for web interactivity</dd>
    </dl>

</body>
</html>
