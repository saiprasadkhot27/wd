<!DOCTYPE html>
<html>
<head>
    <title>Grocery Bill</title>
<style>
th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
</style>

</head>
<body bgcolor="lightgray">

<h2 align="center">Grocery Bill</h2>

<table border="1" width="60%" align="center" cellpadding="10" cellspacing="0">

    <tr bgcolor="yellow">
        <th>Description</th>
        <th>Item No</th>
        <th>Item Name</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Total</th>
    </tr>

    <tr bgcolor="lightblue">
        <td bgcolor="orange" rowspan="5"><b>Billing Description</b></td>
        <td>1</td>
        <td>Rice</td>
        <td>2 kg</td>
        <td>50</td>
        <td>100</td>
    </tr>

    <tr bgcolor="lightgreen">
        <td>2</td>
        <td>Milk</td>
        <td>3</td>
        <td>25</td>
        <td>75</td>
    </tr>

    <tr bgcolor="lightpink">
        <td>3</td>
        <td>Bread</td>
        <td>2</td>
        <td>30</td>
        <td>60</td>
    </tr>

    <tr bgcolor="lightyellow">
        <td>4</td>
        <td>Eggs</td>
        <td>12</td>
        <td>6</td>
        <td>72</td>
    </tr>

    <tr bgcolor="lightcoral">
        <td>5</td>
        <td>Mango</td>
        <td>1 kg</td>
        <td>60</td>
        <td>60</td>
    </tr>

    <tr bgcolor="white">
        <td colspan="5"><b>Grand Total</b></td>
        <td><b>367</b></td>
    </tr>

</table>

</body>
</html>
