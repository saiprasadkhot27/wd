<!DOCTYPE html>
<html>
<head>
    <title>Simple Grocery Bill</title>
<style>
  table {
            width: 60%;
            margin: 50px auto;
            border-collapse: collapse;
            background-color: white;
        }
 th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        </style>
</head>
<body>

<h2>Grocery Bill</h2>

<table border="1">
    <tr>
        <th>Item No</th>
        <th>Item Name</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Total</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Rice</td>
        <td>2 kg</td>
        <td>50</td>
        <td>100</td>
    </tr>

    <tr>
        <td>2</td>
        <td>Milk</td>
        <td>3</td>
        <td>25</td>
        <td>75</td>
    </tr>

    <tr>
        <td>3</td>
        <td>Bread</td>
        <td>2</td>
        <td>30</td>
        <td>60</td>
    </tr>

    <tr>
        <td>4</td>
        <td>Eggs</td>
        <td>12</td>
        <td>6</td>
        <td>72</td>
    </tr>

    <tr>
        <td colspan="4">Grand Total</td>
        <td>307</td>
    </tr>

</table>

</body>
</html>
