<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form</title>
</head>

<body>

<form>

<label>First Name:</label>
<input type="text" name="firstname"><br><br>

<label>Select Passing Year:</label>
<input type="checkbox" name="passing_year" value="2027"> 2027
<input type="checkbox" name="passing_year" value="2028"> 2028
<br><br>

<label>Select Your Year:</label><br>

<input type="radio" name="study_year" value="FY"> F.Y<br>
<input type="radio" name="study_year" value="SY"> S.Y<br>
<input type="radio" name="study_year" value="TY"> T.Y<br>

<br>

<label>Password:</label>
<input type="password" name="password"><br><br>

<label for="course">Select Course:</label>
<select id="course" name="course">
<option value="ai">AI</option>
<option value="ml">Machine Learning</option>
<option value="ds">Data Science</option>
<option value="web">Web Development</option>
</select>

<br><br>

<label>Select Gender:</label><br>

<input type="radio" name="gender" value="male"> Male<br>
<input type="radio" name="gender" value="female"> Female<br>
<input type="radio" name="gender" value="other"> Other<br>

<br>

<input type="submit">

</form>

</body>
</html>
